name: Build and Publish PyPI

on:
  push:
    tags:
      - 'moipy-v*'
      - 'moipy-gurobi-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. 新增：动态解析 Tag，决定需要编译的包
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      # 将 bash 脚本输出的包列表传递给后续 Job
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - name: Determine target packages based on tag
        id: set-packages
        run: |
          if [[ "${{ github.ref }}" == refs/tags/moipy-v* ]]; then
            echo 'packages=["moipy"]' >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/moipy-gurobi-v* ]]; then
            echo 'packages=["moipy-gurobi"]' >> "$GITHUB_OUTPUT"
          else
            # 如果是手动触发 (workflow_dispatch)，默认同时编译两个包
            echo 'packages=["moipy", "moipy-gurobi"]' >> "$GITHUB_OUTPUT"
          fi

  # 2. 编译各平台的 Wheel 包
  build-wheels:
    name: Build ${{ matrix.package }} on ${{ matrix.platform.runner }} (${{ matrix.platform.target }})
    needs: prepare # 依赖 prepare 任务
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # ⚠️ 核心魔法：从 prepare 任务动态读取需要编译的包
        package: ${{ fromJSON(needs.prepare.outputs.packages) }}
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
          - runner: windows-latest
            target: x64
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: python/${{ matrix.package }}/Cargo.toml
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.package }}-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  # 3. 编译源码包 (SDist)
  sdist:
    name: Build ${{ matrix.package }} sdist
    needs: prepare # 同样依赖 prepare 任务
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          manifest-path: python/${{ matrix.package }}/Cargo.toml
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist-${{ matrix.package }}
          path: dist

  # 4. 安全发布到 PyPI
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, sdist]
    
    permissions:
      id-token: write 
      contents: write 
      
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1